<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Müzik">
<meta name="theme-color" content="#0a0a0f">
<title>Müzik</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f8;
    --muted: #6b6b80;
    --accent: #c8a87a;
    --accent2: #7a8ac8;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    height:100%; background:var(--bg); color:var(--text);
    font-family:'DM Sans', sans-serif; overflow:hidden;
    user-select:none; -webkit-user-select:none;
  }

  /* ── Layout ─────────────────────────────── */
  #app {
    display:grid;
    grid-template-rows: 1fr auto;
    height: 100dvh;
    padding-top: var(--safe-top);
  }

  #main-view {
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  /* ── Header ─────────────────────────────── */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 20px 24px 12px;
    flex-shrink:0;
  }
  header h1 { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; letter-spacing:-0.5px; }
  header h1 span { color:var(--accent); }
  .header-actions { display:flex; gap:8px; }
  .icon-btn {
    width:38px; height:38px; border-radius:50%; border:1px solid var(--border);
    background:var(--surface); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted); transition:all .2s; font-size:16px;
  }
  .icon-btn:hover { color:var(--text); border-color:rgba(255,255,255,.15); }
  .icon-btn.active { color:var(--accent); border-color:var(--accent); background: rgba(200,168,122,.1); }

  /* ── Search ─────────────────────────────── */
  #search-wrap {
    padding: 0 24px 12px;
    flex-shrink:0;
  }
  #search-wrap input {
    width:100%; padding:10px 16px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:14px;
    outline:none; transition:border-color .2s;
  }
  #search-wrap input:focus { border-color:var(--accent); }
  #search-wrap input::placeholder { color:var(--muted); }

  /* ── Now Playing Card ────────────────────── */
  #now-playing {
    margin: 0 24px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    gap: 14px;
    align-items: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: border-color .2s;
  }
  #now-playing:hover { border-color: rgba(255,255,255,.15); }
  #np-cover {
    width:52px; height:52px; border-radius:10px;
    object-fit:cover; background:var(--surface2); flex-shrink:0;
    position:relative; overflow:hidden;
  }
  #np-cover img { width:100%; height:100%; object-fit:cover; border-radius:10px; }
  #np-cover .vinyl {
    position:absolute; inset:0; border-radius:50%;
    display:none; align-items:center; justify-content:center;
  }
  #np-info { flex:1; min-width:0; }
  #np-title {
    font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #np-artist { font-size:12px; color:var(--muted); margin-top:2px; }
  #np-controls { display:flex; gap:6px; align-items:center; flex-shrink:0; }
  .ctrl-btn {
    width:34px; height:34px; border-radius:50%;
    background:transparent; border:none; cursor:pointer;
    color:var(--text); display:flex; align-items:center; justify-content:center;
    font-size:15px; transition:color .15s, transform .1s;
  }
  .ctrl-btn:hover { color:var(--accent); }
  .ctrl-btn:active { transform:scale(.9); }
  .ctrl-btn.play-pause {
    width:40px; height:40px; font-size:17px;
    background:var(--accent); color:#0a0a0f;
    border-radius:50%; font-weight:700;
  }
  .ctrl-btn.play-pause:hover { background:#d4b88a; color:#0a0a0f; }

  /* ── Progress bar (mini) ─────────────────── */
  #progress-mini {
    height:2px; background:var(--surface2);
    border-radius:1px; margin-top:10px; cursor:pointer; position:relative;
  }
  #progress-mini-fill {
    height:100%; background:var(--accent); border-radius:1px;
    width:0%; transition:width .5s linear;
  }

  /* ── Track List ─────────────────────────── */
  #tracklist-wrap {
    flex:1; overflow-y:auto; padding: 0 24px;
    -webkit-overflow-scrolling: touch;
  }
  #tracklist-wrap::-webkit-scrollbar { display:none; }

  .section-label {
    font-family:'Syne',sans-serif; font-size:11px; font-weight:700;
    color:var(--muted); letter-spacing:1.5px; text-transform:uppercase;
    margin-bottom:10px;
  }

  .track-item {
    display:flex; align-items:center; gap:12px;
    padding:10px 12px; border-radius:12px;
    cursor:pointer; transition:background .15s;
    position:relative;
  }
  .track-item:hover { background:var(--surface); }
  .track-item.active { background:var(--surface); }
  .track-item.active .track-title { color:var(--accent); }

  .track-cover {
    width:44px; height:44px; border-radius:8px;
    object-fit:cover; background:var(--surface2); flex-shrink:0; overflow:hidden;
  }
  .track-cover img { width:100%; height:100%; object-fit:cover; border-radius:8px; }
  .track-cover .placeholder {
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-size:18px; background:var(--surface2); border-radius:8px;
  }

  .track-info { flex:1; min-width:0; }
  .track-title {
    font-size:14px; font-weight:500;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .track-meta {
    font-size:12px; color:var(--muted); margin-top:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .track-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .track-dur { font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; }

  .dl-btn {
    width:28px; height:28px; border-radius:7px;
    background:transparent; border:1px solid var(--border);
    color:var(--muted); cursor:pointer; font-size:13px;
    display:flex; align-items:center; justify-content:center;
    transition:all .2s;
  }
  .dl-btn:hover { color:var(--accent); border-color:var(--accent); }
  .dl-btn.downloaded { color:#6ac28a; border-color:#6ac28a; background:rgba(106,194,138,.1); }
  .dl-btn.downloading { color:var(--accent2); border-color:var(--accent2); animation:pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .playing-wave {
    display:none; align-items:flex-end; gap:2px; height:16px;
  }
  .track-item.active .playing-wave { display:flex; }
  .track-item.active.paused .playing-wave { display:none; }
  .playing-wave span {
    width:3px; background:var(--accent); border-radius:2px;
    animation:wave 0.8s ease-in-out infinite alternate;
  }
  .playing-wave span:nth-child(2) { animation-delay:.15s; }
  .playing-wave span:nth-child(3) { animation-delay:.3s; }
  @keyframes wave { 0%{height:4px} 100%{height:14px} }

  /* ── Player Modal (full screen) ─────────── */
  #player-modal {
    position:fixed; inset:0; z-index:100;
    background:var(--bg);
    display:flex; flex-direction:column;
    padding: max(var(--safe-top), 20px) 0 max(var(--safe-bot), 20px);
    transform:translateY(100%);
    transition:transform .4s cubic-bezier(.32,.72,0,1);
  }
  #player-modal.open { transform:translateY(0); }

  .modal-header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 0 24px 24px;
  }
  .modal-header button {
    background:none; border:none; cursor:pointer; color:var(--muted);
    font-size:22px; display:flex; transition:color .2s;
  }
  .modal-header button:hover { color:var(--text); }
  .modal-title {
    font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
    color:var(--muted); letter-spacing:1px; text-transform:uppercase;
  }

  #big-cover-wrap {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding: 0 40px;
  }
  #big-cover {
    width:min(320px, 80vw); aspect-ratio:1;
    border-radius:20px; overflow:hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 0 1px var(--border);
    transition:transform .3s;
  }
  #big-cover img { width:100%; height:100%; object-fit:cover; }
  #big-cover .placeholder-big {
    width:100%; height:100%; background:var(--surface);
    display:flex; align-items:center; justify-content:center; font-size:80px;
  }

  #modal-info {
    padding: 24px 32px 16px;
    display:flex; align-items:flex-start; justify-content:space-between;
  }
  #modal-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.5px; }
  #modal-artist { font-size:15px; color:var(--muted); margin-top:4px; }

  #modal-progress-wrap { padding: 0 32px 20px; }
  #progress-bar {
    height:4px; background:var(--surface2); border-radius:2px;
    cursor:pointer; position:relative; margin-bottom:8px;
  }
  #progress-fill {
    height:100%; background:var(--accent); border-radius:2px;
    width:0%; pointer-events:none; position:relative;
  }
  #progress-fill::after {
    content:''; position:absolute; right:-6px; top:50%;
    width:12px; height:12px; background:var(--accent);
    border-radius:50%; transform:translateY(-50%);
    box-shadow:0 0 0 3px rgba(200,168,122,.2);
    opacity:0; transition:opacity .2s;
  }
  #progress-bar:hover #progress-fill::after { opacity:1; }
  .time-row { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; }

  #modal-controls {
    display:flex; align-items:center; justify-content:center; gap:16px;
    padding: 0 32px 24px;
  }
  .modal-btn {
    background:none; border:none; cursor:pointer; color:var(--muted);
    font-size:20px; display:flex; align-items:center; justify-content:center;
    transition:color .15s, transform .1s; width:44px; height:44px; border-radius:50%;
  }
  .modal-btn:hover { color:var(--text); }
  .modal-btn:active { transform:scale(.9); }
  .modal-btn.active { color:var(--accent); }
  .modal-play {
    width:64px; height:64px; border-radius:50%;
    background:var(--accent); color:#0a0a0f;
    font-size:26px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; border:none; transition:transform .1s, background .2s;
    box-shadow: 0 8px 24px rgba(200,168,122,.35);
  }
  .modal-play:hover { background:#d4b88a; }
  .modal-play:active { transform:scale(.93); }

  #modal-extras {
    display:flex; justify-content:center; gap:24px;
    padding: 0 32px;
  }

  /* ── Bottom Nav ──────────────────────────── */
  #bottom-bar {
    background:var(--surface); border-top:1px solid var(--border);
    display:flex; justify-content:center; gap:4px;
    padding: 10px 24px max(var(--safe-bot), 10px);
    flex-shrink:0;
  }
  .nav-tab {
    flex:1; display:flex; flex-direction:column; align-items:center;
    gap:4px; padding:6px 0; cursor:pointer; border:none; background:none;
    color:var(--muted); font-size:10px; font-family:'DM Sans',sans-serif;
    transition:color .2s; border-radius:10px; max-width:80px;
  }
  .nav-tab .icon { font-size:20px; }
  .nav-tab.active { color:var(--accent); }

  /* ── Empty / Loading states ─────────────── */
  .empty-state {
    text-align:center; padding:60px 24px; color:var(--muted);
  }
  .empty-state .emoji { font-size:48px; margin-bottom:16px; }
  .empty-state p { font-size:14px; line-height:1.6; }

  .loading-dots { display:flex; gap:6px; justify-content:center; padding:40px; }
  .loading-dots span {
    width:8px; height:8px; background:var(--accent); border-radius:50%;
    animation:bounce .8s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay:.15s; }
  .loading-dots span:nth-child(3) { animation-delay:.3s; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  /* ── Toast ──────────────────────────────── */
  #toast {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--surface2); border:1px solid var(--border);
    padding:10px 20px; border-radius:30px; font-size:13px;
    opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap;
    z-index:200;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── Volume ─────────────────────────────── */
  #volume-wrap { display:flex; align-items:center; gap:10px; padding:0 32px 16px; }
  #volume-wrap span { font-size:16px; color:var(--muted); flex-shrink:0; }
  #volume-slider {
    flex:1; -webkit-appearance:none; height:4px;
    background:var(--surface2); border-radius:2px; outline:none; cursor:pointer;
  }
  #volume-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px;
    background:var(--accent); border-radius:50%; cursor:pointer;
  }
</style>
</head>
<body>
<div id="app">
  <!-- Main view -->
  <div id="main-view">
    <header>
      <h1>müzik<span>.</span></h1>
      <div class="header-actions">
        <button class="icon-btn" id="shuffle-btn" title="Karıştır">⇌</button>
        <button class="icon-btn" id="repeat-btn" title="Tekrarla">⟳</button>
        <button class="icon-btn" id="offline-btn" title="Çevrimdışı şarkılar">↓</button>
      </div>
    </header>

    <div id="search-wrap">
      <input type="search" id="search-input" placeholder="Şarkı, sanatçı ara…" autocomplete="off">
    </div>

    <!-- Mini now playing -->
    <div id="now-playing" onclick="openPlayerModal()">
      <div id="np-cover"><img id="np-img" src="" alt="" onerror="this.style.display='none'">
        <div id="np-placeholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px;">🎵</div>
      </div>
      <div id="np-info">
        <div id="np-title">Şarkı Seçin</div>
        <div id="np-artist">–</div>
        <div id="progress-mini"><div id="progress-mini-fill"></div></div>
      </div>
      <div id="np-controls">
        <button class="ctrl-btn" id="prev-mini" onclick="event.stopPropagation();prevTrack()">⏮</button>
        <button class="ctrl-btn play-pause" id="play-mini" onclick="event.stopPropagation();togglePlay()">▶</button>
        <button class="ctrl-btn" id="next-mini" onclick="event.stopPropagation();nextTrack()">⏭</button>
      </div>
    </div>

    <!-- Track list -->
    <div id="tracklist-wrap">
      <div id="track-list-inner">
        <div class="loading-dots"><span></span><span></span><span></span></div>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div id="bottom-bar">
    <button class="nav-tab active" id="tab-all" onclick="switchTab('all')">
      <span class="icon">🎵</span><span>Tümü</span>
    </button>
    <button class="nav-tab" id="tab-downloaded" onclick="switchTab('downloaded')">
      <span class="icon">📥</span><span>İndirildi</span>
    </button>
  </div>
</div>

<!-- Full Player Modal -->
<div id="player-modal">
  <div class="modal-header">
    <button onclick="closePlayerModal()">⌄</button>
    <span class="modal-title">Şimdi Çalıyor</span>
    <button id="modal-dl-btn" onclick="downloadCurrent()">↓</button>
  </div>

  <div id="big-cover-wrap">
    <div id="big-cover">
      <div class="placeholder-big" id="big-placeholder">🎵</div>
      <img id="big-img" src="" alt="" style="display:none" onerror="this.style.display='none';document.getElementById('big-placeholder').style.display='flex'">
    </div>
  </div>

  <div id="modal-info">
    <div>
      <div id="modal-title">–</div>
      <div id="modal-artist">–</div>
    </div>
  </div>

  <div id="modal-progress-wrap">
    <div id="progress-bar" onmousedown="seekStart(event)" ontouchstart="seekStart(event)">
      <div id="progress-fill"></div>
    </div>
    <div class="time-row">
      <span id="time-cur">0:00</span>
      <span id="time-total">0:00</span>
    </div>
  </div>

  <div id="volume-wrap">
    <span>🔈</span>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
    <span>🔊</span>
  </div>

  <div id="modal-controls">
    <button class="modal-btn" id="shuffle-modal" onclick="toggleShuffle()" title="Karıştır">⇌</button>
    <button class="modal-btn" onclick="prevTrack()">⏮</button>
    <button class="modal-play" id="modal-play-btn" onclick="togglePlay()">▶</button>
    <button class="modal-btn" onclick="nextTrack()">⏭</button>
    <button class="modal-btn" id="repeat-modal" onclick="toggleRepeat()" title="Tekrarla">⟳</button>
  </div>
</div>

<div id="toast"></div>

<audio id="audio"></audio>

<script>
// ── Config ────────────────────────────────────────────────────────────────
// playlist.json dosyanın raw GitHub URL'si:
const PLAYLIST_URL = 'https://github.com/chatillon7/muzik/blob/3202355a1c82e0a80abfdb50c2ea0253b9d3119c/playlist.json'; // Geliştirme için lokal; GitHub'da tam URL koy

// ── State ─────────────────────────────────────────────────────────────────
let playlist = [];
let filteredList = [];
let currentIndex = 0;
let isPlaying = false;
let isShuffle = false;
let repeatMode = 0; // 0=off, 1=all, 2=one
let shuffledOrder = [];
let currentTab = 'all';
let downloadedIds = new Set();
const DB_NAME = 'muzik_db';
const DB_VER = 1;
let db;

const audio = document.getElementById('audio');

// ── IndexedDB ─────────────────────────────────────────────────────────────
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('tracks')) d.createObjectStore('tracks', { keyPath: 'id' });
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}

async function saveTrackToDB(id, blob) {
  return new Promise((res, rej) => {
    const tx = db.transaction('tracks', 'readwrite');
    tx.objectStore('tracks').put({ id, blob });
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}

async function getTrackFromDB(id) {
  return new Promise((res) => {
    const tx = db.transaction('tracks', 'readonly');
    const req = tx.objectStore('tracks').get(id);
    req.onsuccess = () => res(req.result ? req.result.blob : null);
    req.onerror = () => res(null);
  });
}

async function loadDownloadedIds() {
  return new Promise((res) => {
    const tx = db.transaction('tracks', 'readonly');
    const req = tx.objectStore('tracks').getAllKeys();
    req.onsuccess = () => { downloadedIds = new Set(req.result); res(); };
    req.onerror = () => res();
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
(async () => {
  await openDB();
  await loadDownloadedIds();
  await loadPlaylist();
  setupAudio();
  setupMediaSession();
})();

async function getDuration(src) {
  return new Promise(res => {
    const a = new Audio();
    a.addEventListener('loadedmetadata', () => res(a.duration), { once: true });
    a.addEventListener('error', () => res(0), { once: true });
    a.preload = 'metadata';
    a.src = src;
  });
}

async function loadPlaylist() {
  try {
    const res = await fetch(PLAYLIST_URL + '?t=' + Date.now());
    playlist = await res.json();
    // duration alanını temizle — hepsini otomatik yükleyeceğiz
    playlist.forEach(t => { delete t.duration; });
    filteredList = [...playlist];
    renderTrackList();
    // Süreleri arka planda, sırayla yükle (sunucuyu boğmamak için)
    for (let i = 0; i < playlist.length; i++) {
      const t = playlist[i];
      getDuration(t.src).then(dur => {
        playlist[i].duration = dur;
        const el = document.getElementById('dur-' + t.id);
        if (el && dur) el.textContent = fmtTime(dur);
      });
    }
  } catch(e) {
    document.getElementById('track-list-inner').innerHTML = `
      <div class="empty-state">
        <div class="emoji">📡</div>
        <p>playlist.json yüklenemedi.<br>PLAYLIST_URL'yi kontrol edin.</p>
      </div>`;
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function renderTrackList() {
  const list = filteredList.filter(t => {
    if (currentTab === 'downloaded') return downloadedIds.has(t.id);
    return true;
  });

  if (list.length === 0) {
    document.getElementById('track-list-inner').innerHTML = `
      <div class="empty-state">
        <div class="emoji">${currentTab === 'downloaded' ? '📥' : '🎵'}</div>
        <p>${currentTab === 'downloaded' ? 'Henüz indirilmiş şarkı yok.' : 'Şarkı bulunamadı.'}</p>
      </div>`;
    return;
  }

  const actualIdx = currentTrackActualIndex();
  document.getElementById('track-list-inner').innerHTML = `
    <p class="section-label">${list.length} şarkı</p>
    ${list.map((t, i) => {
      const isActive = t.id === (playlist[actualIdx] || {}).id;
      const isDL = downloadedIds.has(t.id);
      return `
      <div class="track-item${isActive ? ' active' : ''}" id="track-${t.id}" onclick="playTrackById('${t.id}')">
        <div class="track-cover">
          ${t.cover ? `<img src="${t.cover}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="placeholder" style="display:none">🎵</div>` : '<div class="placeholder">🎵</div>'}
        </div>
        <div class="track-info">
          <div class="track-title">${esc(t.title)}</div>
          <div class="track-meta">${esc(t.artist)}${t.album ? ' · ' + esc(t.album) : ''}</div>
        </div>
        <div class="track-right">
          <div class="playing-wave"><span></span><span></span><span></span></div>
          <span class="track-dur" id="dur-${t.id}">${t.duration ? fmtTime(t.duration) : '–'}</span>
          <button class="dl-btn ${isDL ? 'downloaded' : ''}" id="dl-${t.id}"
            onclick="event.stopPropagation();downloadTrack('${t.id}')"
            title="${isDL ? 'İndirildi' : 'İndir'}">
            ${isDL ? '✓' : '↓'}
          </button>
        </div>
      </div>`;
    }).join('')}`;
}

function updateActiveTrack() {
  document.querySelectorAll('.track-item').forEach(el => {
    el.classList.remove('active','paused');
  });
  const t = playlist[currentTrackActualIndex()];
  if (!t) return;
  const el = document.getElementById('track-' + t.id);
  if (el) {
    el.classList.add('active');
    if (!isPlaying) el.classList.add('paused');
    el.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

// ── Playback ──────────────────────────────────────────────────────────────
function currentTrackActualIndex() {
  if (isShuffle && shuffledOrder.length) {
    return shuffledOrder[currentIndex] ?? currentIndex;
  }
  return currentIndex;
}

async function playTrackById(id) {
  const idx = playlist.findIndex(t => t.id === id);
  if (idx < 0) return;
  if (isShuffle) {
    currentIndex = shuffledOrder.indexOf(idx);
    if (currentIndex < 0) { currentIndex = 0; }
  } else {
    currentIndex = idx;
  }
  await loadAndPlay();
}

async function loadAndPlay() {
  const t = playlist[currentTrackActualIndex()];
  if (!t) return;

  // Check offline first
  const blob = await getTrackFromDB(t.id);
  if (blob) {
    audio.src = URL.createObjectURL(blob);
  } else {
    audio.src = t.src;
  }
  audio.load();
  audio.play().catch(() => {});
  isPlaying = true;
  updateUI(t);
  updateActiveTrack();
  updateMediaSession(t);
}

function updateUI(t) {
  // Mini player
  document.getElementById('np-title').textContent = t.title;
  document.getElementById('np-artist').textContent = t.artist;
  const npImg = document.getElementById('np-img');
  const npPh = document.getElementById('np-placeholder');
  if (t.cover) { npImg.src = t.cover; npImg.style.display = ''; npPh.style.display = 'none'; }
  else { npImg.style.display = 'none'; npPh.style.display = 'flex'; }

  // Modal
  document.getElementById('modal-title').textContent = t.title;
  document.getElementById('modal-artist').textContent = t.artist;
  const bigImg = document.getElementById('big-img');
  const bigPh = document.getElementById('big-placeholder');
  if (t.cover) {
    bigImg.src = t.cover; bigImg.style.display = '';
    bigPh.style.display = 'none';
  } else {
    bigImg.style.display = 'none'; bigPh.style.display = 'flex';
  }

  updatePlayBtns();
}

function updatePlayBtns() {
  const icon = isPlaying ? '⏸' : '▶';
  document.getElementById('play-mini').textContent = icon;
  document.getElementById('modal-play-btn').textContent = icon;
  // pause class for wave anim
  const t = playlist[currentTrackActualIndex()];
  if (t) {
    const el = document.getElementById('track-' + t.id);
    if (el) {
      if (isPlaying) el.classList.remove('paused');
      else el.classList.add('paused');
    }
  }
}

function togglePlay() {
  if (playlist.length === 0) return;
  if (!audio.src && playlist.length) { loadAndPlay(); return; }
  if (isPlaying) { audio.pause(); isPlaying = false; }
  else { audio.play(); isPlaying = true; }
  updatePlayBtns();
}

function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (isShuffle) {
    currentIndex = (currentIndex - 1 + shuffledOrder.length) % shuffledOrder.length;
  } else {
    currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
  }
  loadAndPlay();
}

function nextTrack() {
  if (isShuffle) {
    currentIndex = (currentIndex + 1) % shuffledOrder.length;
  } else {
    currentIndex = (currentIndex + 1) % playlist.length;
  }
  loadAndPlay();
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  if (isShuffle) {
    shuffledOrder = shuffle([...Array(playlist.length).keys()]);
    currentIndex = 0;
  }
  document.getElementById('shuffle-btn').classList.toggle('active', isShuffle);
  document.getElementById('shuffle-modal').classList.toggle('active', isShuffle);
  toast(isShuffle ? '🔀 Karıştır açık' : 'Karıştır kapalı');
}

function toggleRepeat() {
  repeatMode = (repeatMode + 1) % 3;
  const labels = ['Tekrar kapalı', '🔁 Tümünü tekrarla', '🔂 Şarkıyı tekrarla'];
  const icons = ['⟳', '🔁', '🔂'];
  document.getElementById('repeat-btn').textContent = icons[repeatMode];
  document.getElementById('repeat-modal').textContent = icons[repeatMode];
  document.getElementById('repeat-btn').classList.toggle('active', repeatMode > 0);
  document.getElementById('repeat-modal').classList.toggle('active', repeatMode > 0);
  toast(labels[repeatMode]);
}

function setVolume(v) { audio.volume = v; }

// ── Audio events ───────────────────────────────────────────────────────────
function setupAudio() {
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-mini-fill').style.width = pct + '%';
    document.getElementById('time-cur').textContent = fmtTime(audio.currentTime);
    document.getElementById('time-total').textContent = fmtTime(audio.duration);
    if (navigator.mediaSession) {
      navigator.mediaSession.setPositionState({ duration: audio.duration, playbackRate: 1, position: audio.currentTime });
    }
  });

  audio.addEventListener('ended', () => {
    if (repeatMode === 2) { audio.currentTime = 0; audio.play(); return; }
    nextTrack();
  });

  audio.addEventListener('play', () => { isPlaying = true; updatePlayBtns(); });
  audio.addEventListener('pause', () => { isPlaying = false; updatePlayBtns(); });
}

// ── Progress seek ─────────────────────────────────────────────────────────
function seekStart(e) {
  e.preventDefault();
  const bar = document.getElementById('progress-bar');
  const seek = ev => {
    const clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const rect = bar.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    if (audio.duration) audio.currentTime = pct * audio.duration;
  };
  seek(e);
  const up = () => { document.removeEventListener('mousemove', seek); document.removeEventListener('touchmove', seek); document.removeEventListener('mouseup', up); document.removeEventListener('touchend', up); };
  document.addEventListener('mousemove', seek); document.addEventListener('touchmove', seek, { passive:false });
  document.addEventListener('mouseup', up); document.addEventListener('touchend', up);
}

// ── Download ───────────────────────────────────────────────────────────────
async function downloadTrack(id) {
  if (downloadedIds.has(id)) { toast('Zaten indirildi ✓'); return; }
  const t = playlist.find(p => p.id === id);
  if (!t) return;
  const btn = document.getElementById('dl-' + id);
  if (btn) { btn.classList.add('downloading'); btn.textContent = '⟳'; }
  toast(`İndiriliyor: ${t.title}`);
  try {
    const res = await fetch(t.src);
    const blob = await res.blob();
    await saveTrackToDB(id, blob);
    downloadedIds.add(id);
    if (btn) { btn.classList.remove('downloading'); btn.classList.add('downloaded'); btn.textContent = '✓'; }
    toast(`İndirildi: ${t.title} ✓`);
  } catch(e) {
    if (btn) { btn.classList.remove('downloading'); btn.textContent = '↓'; }
    toast('İndirme başarısız.');
  }
}

async function downloadCurrent() {
  const t = playlist[currentTrackActualIndex()];
  if (t) await downloadTrack(t.id);
}

// ── Search ─────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  filteredList = q ? playlist.filter(t =>
    t.title.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q) || (t.album||'').toLowerCase().includes(q)
  ) : [...playlist];
  renderTrackList();
});

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderTrackList();
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openPlayerModal() {
  document.getElementById('player-modal').classList.add('open');
}
function closePlayerModal() {
  document.getElementById('player-modal').classList.remove('open');
}

// ── Media Session API ─────────────────────────────────────────────────────
function setupMediaSession() {
  if (!navigator.mediaSession) return;
  navigator.mediaSession.setActionHandler('play', () => { audio.play(); isPlaying = true; updatePlayBtns(); });
  navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); isPlaying = false; updatePlayBtns(); });
  navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
  navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
  navigator.mediaSession.setActionHandler('seekto', details => { if (audio.duration) audio.currentTime = details.seekTime; });
}

function updateMediaSession(t) {
  if (!navigator.mediaSession) return;
  const artwork = t.cover ? [{ src: t.cover, sizes:'512x512', type:'image/jpeg' }] : [];
  navigator.mediaSession.metadata = new MediaMetadata({ title: t.title, artist: t.artist, album: t.album || '', artwork });
}

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtTime(s) {
  s = Math.floor(s || 0);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function shuffle(arr) { for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Service Worker ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
